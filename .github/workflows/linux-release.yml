name: linux-release

# Package GhidraVibe AppImages for Linux (x86_64 and aarch64)
# - push to master/main → rolling GitHub Release "beta" (prerelease)
# - tag v* → dedicated GitHub Release for that tag
#
# Uses `nix bundle` with the ralismark/nix-appimage bundler, which produces a
# genuinely portable AppImage (statically-linked musl runtime, no dependency
# on the host's glibc or /nix/store) instead of a raw copy of Nix outputs.
on:
  push:
    branches: [master, main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: linux-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-appimage:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=
            substituters = https://cache.nixos.org https://nix-community.cachix.org
            extra-experimental-features = nix-command flakes

      - name: Determine version
        run: |
          SHA="$(git rev-parse --short HEAD)"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="0.1.0-${SHA}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "SHA=$SHA" >> "$GITHUB_ENV"

      - name: Build portable AppImage with nix bundle
        run: |
          # Native build on GitHub-hosted arch-matched runners (no QEMU emulation).
          mkdir -p dist
          nix bundle \
            --bundler github:ralismark/nix-appimage \
            -o /tmp/GhidraVibe.AppImage \
            .#ghidra-vibe-gtk \
            --print-build-logs
          cp -L /tmp/GhidraVibe.AppImage "dist/GhidraVibe-${VERSION}-${{ matrix.arch }}.AppImage"
          chmod +x "dist/GhidraVibe-${VERSION}-${{ matrix.arch }}.AppImage"
          cp -f "dist/GhidraVibe-${VERSION}-${{ matrix.arch }}.AppImage" \
                "dist/GhidraVibe-latest-${{ matrix.arch }}.AppImage"

      - name: Generate metadata
        run: |
          cat > "dist/latest-${{ matrix.arch }}.json" <<EOF
          {
            "name": "GhidraVibe",
            "version": "${VERSION}",
            "arch": "${{ matrix.arch }}",
            "platform": "linux",
            "sha": "${SHA}",
            "appimage": "GhidraVibe-${VERSION}-${{ matrix.arch }}.AppImage",
            "built_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GhidraVibe-AppImage-${{ matrix.arch }}
          path: |
            dist/*.AppImage
            dist/*.json
          if-no-files-found: error
          retention-days: 14

  publish-release:
    needs: package-appimage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize artifacts
        run: |
          mkdir -p dist
          cp artifacts/GhidraVibe-AppImage-x86_64/* dist/
          cp artifacts/GhidraVibe-AppImage-aarch64/* dist/
          ls -lh dist/

      - name: Generate release notes
        run: |
          chmod +x scripts/generate-release-notes.sh
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            ./scripts/generate-release-notes.sh tag > dist/RELEASE_NOTES.md
          else
            ./scripts/generate-release-notes.sh beta > dist/RELEASE_NOTES.md
          fi

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NOTES=dist/RELEASE_NOTES.md

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
            if gh release view "$TAG" >/dev/null 2>&1; then
              gh release upload "$TAG" dist/*.AppImage dist/*.json --clobber
              gh release edit "$TAG" --notes-file "$NOTES" --latest
            else
              gh release create "$TAG" \
                dist/*.AppImage dist/*.json \
                --title "GhidraVibe ${TAG}" \
                --notes-file "$NOTES" \
                --latest
            fi
          else
            # Rolling beta: move lightweight tag to this commit, replace prerelease assets.
            git tag -f beta "${GITHUB_SHA}"
            git push origin refs/tags/beta --force
            if gh release view beta >/dev/null 2>&1; then
              SHORT_SHA="$(git rev-parse --short HEAD)"
              # Drop stale per-commit .AppImage assets from previous beta runs so
              # the rolling release doesn't accumulate one AppImage per push forever.
              gh release view beta --json assets --jq '.assets[].name' | while read -r name; do
                if [[ "$name" == GhidraVibe-*.AppImage && "$name" != *"$SHORT_SHA"* && "$name" != GhidraVibe-latest-*.AppImage ]]; then
                  gh release delete-asset beta "$name" -y || true
                fi
              done
              gh release upload beta dist/*.AppImage dist/*.json --clobber
              gh release edit beta --notes-file "$NOTES" --prerelease --title "GhidraVibe Beta"
            else
              gh release create beta \
                dist/*.AppImage dist/*.json \
                --title "GhidraVibe Beta" \
                --notes-file "$NOTES" \
                --prerelease
            fi
          fi
