name: linux-release

# Package GhidraVibe AppImages for Linux (x86_64 and aarch64)
# - push to master/main → rolling GitHub Release "beta" (prerelease)
# - tag v* → dedicated GitHub Release for that tag
on:
  push:
    branches: [master, main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: linux-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-appimage:
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=
            substituters = https://cache.nixos.org https://nix-community.cachix.org

      - name: Set up QEMU for cross-compilation
        if: matrix.arch == 'aarch64'
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support

      - name: Build GhidraVibe GTK
        run: |
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            # Cross-compile for aarch64
            nix build .#packages.aarch64-linux.ghidra-vibe-gtk --print-build-logs
          else
            # Native x86_64 build
            nix build .#ghidra-vibe-gtk --print-build-logs
          fi

      - name: Install AppImage tools
        run: |
          wget -O /tmp/appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-${{ matrix.arch }}.AppImage
          chmod +x /tmp/appimagetool

      - name: Create AppImage structure
        run: |
          VERSION="${GHIDRA_VIBE_VERSION:-}"
          SHA="$(git rev-parse --short HEAD)"
          
          if [[ -z "$VERSION" ]]; then
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              VERSION="${GITHUB_REF_NAME}"
            else
              VERSION="0.1.0-${SHA}"
            fi
          fi
          
          mkdir -p dist
          APPDIR="dist/GhidraVibe.AppDir"
          mkdir -p "$APPDIR/usr/bin" "$APPDIR/usr/lib" "$APPDIR/usr/share"
          
          # Copy GhidraVibe installation
          if [ -d "result" ]; then
            cp -r result/* "$APPDIR/usr/"
          fi
          
          # Create AppRun script
          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"
          export GHIDRA_INSTALL_DIR="${HERE}/usr/lib/ghidra"
          exec "${HERE}/usr/bin/ghidra-vibe" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"
          
          # Create desktop file
          cat > "$APPDIR/ghidravibe.desktop" <<EOF
          [Desktop Entry]
          Name=GhidraVibe
          Exec=ghidra-vibe
          Icon=ghidravibe
          Type=Application
          Categories=Development;
          Comment=Native UI for Ghidra reverse engineering
          EOF
          
          # Copy icon
          if [ -f "native-ui/icons/png/GhidraIcon256.png" ]; then
            cp native-ui/icons/png/GhidraIcon256.png "$APPDIR/ghidravibe.png"
            ln -s ghidravibe.png "$APPDIR/.DirIcon"
          fi
          
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build AppImage
        run: |
          /tmp/appimagetool dist/GhidraVibe.AppDir "dist/GhidraVibe-${{ env.VERSION }}-${{ matrix.arch }}.AppImage"
          
          # Create versioned copy
          cp "dist/GhidraVibe-${{ env.VERSION }}-${{ matrix.arch }}.AppImage" \
             "dist/GhidraVibe-latest-${{ matrix.arch }}.AppImage"

      - name: Generate metadata
        run: |
          cat > "dist/latest-${{ matrix.arch }}.json" <<EOF
          {
            "name": "GhidraVibe",
            "version": "${{ env.VERSION }}",
            "arch": "${{ matrix.arch }}",
            "platform": "linux",
            "sha": "$(git rev-parse --short HEAD)",
            "appimage": "GhidraVibe-${{ env.VERSION }}-${{ matrix.arch }}.AppImage",
            "built_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GhidraVibe-AppImage-${{ matrix.arch }}
          path: |
            dist/*.AppImage
            dist/*.json
          retention-days: 14

  publish-release:
    needs: package-appimage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize artifacts
        run: |
          mkdir -p dist
          cp artifacts/GhidraVibe-AppImage-x86_64/* dist/
          cp artifacts/GhidraVibe-AppImage-aarch64/* dist/
          ls -lh dist/

      - name: Generate release notes
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            ./scripts/generate-release-notes.sh tag > dist/RELEASE_NOTES.md
          else
            ./scripts/generate-release-notes.sh beta > dist/RELEASE_NOTES.md
          fi

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NOTES=dist/RELEASE_NOTES.md
          
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
            if gh release view "$TAG" >/dev/null 2>&1; then
              gh release upload "$TAG" dist/*.AppImage dist/*.json --clobber
              gh release edit "$TAG" --notes-file "$NOTES" --latest
            else
              gh release create "$TAG" \
                dist/*.AppImage dist/*.json \
                --title "GhidraVibe ${TAG}" \
                --notes-file "$NOTES" \
                --latest
            fi
          else
            # Rolling beta: move lightweight tag to this commit, replace prerelease assets.
            git tag -f beta "${GITHUB_SHA}"
            git push origin refs/tags/beta --force
            if gh release view beta >/dev/null 2>&1; then
              gh release upload beta dist/*.AppImage dist/*.json --clobber
              gh release edit beta --notes-file "$NOTES" --prerelease --title "GhidraVibe Beta"
            else
              gh release create beta \
                dist/*.AppImage dist/*.json \
                --title "GhidraVibe Beta" \
                --notes-file "$NOTES" \
                --prerelease
            fi
          fi
