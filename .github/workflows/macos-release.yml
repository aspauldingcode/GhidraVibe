name: macos-release

# Package GhidraVibe.dmg on push/tag.
# - push to master/main → rolling GitHub Release "beta" (prerelease) + update releases branch
# - tag v* → dedicated GitHub Release for that tag + update releases branch
#
# NOTE: GitHub-hosted macos-14 runners currently have Swift 5.10, but GhidraVibe requires Swift 6.2+.
#       This workflow will check for Swift 6.2 and skip the build if not available.
#       To create releases, either wait for GitHub to update runners, use a self-hosted runner with Swift 6.2+,
#       or build locally with 'nix build .#ghidra-vibe-app'.
on:
  push:
    branches: [master, main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: macos-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-dmg:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Swift version
        id: swift-check
        run: |
          SWIFT_VERSION=$(xcrun swift --version | head -1 || echo "not found")
          echo "Swift version: $SWIFT_VERSION"
          echo "swift_version=$SWIFT_VERSION" >> "$GITHUB_OUTPUT"
          
          # Check if Swift 6.2+ is available
          if xcrun swift --version 2>/dev/null | grep -q "Swift version 6\.[2-9]"; then
            echo "swift_62_available=true" >> "$GITHUB_OUTPUT"
            echo "✅ Swift 6.2+ is available"
          else
            echo "swift_62_available=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Swift 6.2+ is not available (required for macOS app build)"
            echo "   Current runner has: $SWIFT_VERSION"
            echo "   This workflow will skip the macOS app build"
          fi

      - name: Skip build notice
        if: steps.swift-check.outputs.swift_62_available != 'true'
        run: |
          echo "::warning title=macOS App Build Skipped::GitHub-hosted macos-14 runners currently have Swift 5.10, but GhidraVibe requires Swift 6.2+. The macOS .app/.dmg build is skipped. To create releases, either: (1) wait for GitHub to update runners, (2) use a self-hosted runner with Swift 6.2+, or (3) build locally with 'nix build .#ghidra-vibe-app'."
          echo "ℹ️  This job will exit successfully to not block other CI workflows."
          exit 0

      # Remaining steps only run if Swift 6.2+ is available
      - name: Install Nix
        if: steps.swift-check.outputs.swift_62_available == 'true'
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=
            substituters = https://cache.nixos.org https://nix-community.cachix.org

      - name: Build GhidraVibe with Nix
        if: steps.swift-check.outputs.swift_62_available == 'true'
        run: |
          nix build .#ghidra-vibe --print-build-logs
          echo "GHIDRA_INSTALL_DIR=$PWD/result/lib/ghidra" >> "$GITHUB_ENV"
          # Also build the macOS app
          nix build .#ghidra-vibe-app --print-build-logs -o result-app
          # Stage the pre-built app in a path distinct from package-app.sh's
          # output dir (.build/GhidraVibe.app) so it isn't deleted before use.
          mkdir -p macos/GhidraVibe/.build/nix-prebuilt
          cp -R result-app/Applications/GhidraVibe.app macos/GhidraVibe/.build/nix-prebuilt/GhidraVibe.app
          chmod -R u+w macos/GhidraVibe/.build/nix-prebuilt/GhidraVibe.app

      - name: Setup Java
        if: steps.swift-check.outputs.swift_62_available == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Resolve Ghidra install (for Help extract + runtime.env)
        if: steps.swift-check.outputs.swift_62_available == 'true'
        run: |
          set -euo pipefail
          # Nix build already set GHIDRA_INSTALL_DIR
          echo "GHIDRA_INSTALL_DIR=$GHIDRA_INSTALL_DIR"
          echo "JAVA_HOME=$JAVA_HOME"

      - name: Package DMG
        if: steps.swift-check.outputs.swift_62_available == 'true'
        env:
          SKIP_SWIFT_BUILD: "1"
        run: |
          chmod +x macos/GhidraVibe/scripts/package-app.sh \
                   macos/GhidraVibe/scripts/package-dmg.sh \
                   scripts/generate-release-notes.sh \
                   scripts/extract-stock-help.py
          ./macos/GhidraVibe/scripts/package-dmg.sh

      - name: Generate release notes
        if: steps.swift-check.outputs.swift_62_available == 'true'
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            ./scripts/generate-release-notes.sh tag > dist/RELEASE_NOTES.md
          else
            ./scripts/generate-release-notes.sh beta > dist/RELEASE_NOTES.md
          fi
          # Enrich latest.json with channel + download URL placeholders.
          python3 <<'PY'
          import json, os
          from pathlib import Path
          p = Path("dist/latest.json")
          data = json.loads(p.read_text())
          ref = os.environ.get("GITHUB_REF", "")
          repo = os.environ.get("GITHUB_REPOSITORY", "aspauldingcode/GhidraVibe")
          if ref.startswith("refs/tags/"):
              tag = os.environ["GITHUB_REF_NAME"]
              channel = "stable"
          else:
              tag = "beta"
              channel = "beta"
          data["channel"] = channel
          data["tag"] = tag
          data["release_url"] = f"https://github.com/{repo}/releases/tag/{tag}"
          data["dmg_url"] = f"https://github.com/{repo}/releases/download/{tag}/{data['dmg']}"
          data["dmg_latest_url"] = f"https://github.com/{repo}/releases/download/{tag}/GhidraVibe-latest.dmg"
          p.write_text(json.dumps(data, indent=2) + "\n")
          print(p.read_text())
          PY

      - name: Publish GitHub Release
        if: steps.swift-check.outputs.swift_62_available == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NOTES=dist/RELEASE_NOTES.md
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
            if gh release view "$TAG" >/dev/null 2>&1; then
              gh release upload "$TAG" dist/GhidraVibe-*.dmg dist/latest.json --clobber
              gh release edit "$TAG" --notes-file "$NOTES" --latest
            else
              gh release create "$TAG" \
                dist/GhidraVibe-*.dmg dist/latest.json \
                --title "GhidraVibe ${TAG}" \
                --notes-file "$NOTES" \
                --latest
            fi
          else
            # Rolling beta: move lightweight tag to this commit, replace prerelease assets.
            git tag -f beta "${GITHUB_SHA}"
            git push origin refs/tags/beta --force
            if gh release view beta >/dev/null 2>&1; then
              gh release upload beta dist/GhidraVibe-*.dmg dist/latest.json --clobber
              gh release edit beta --notes-file "$NOTES" --prerelease --title "GhidraVibe Beta"
            else
              gh release create beta \
                dist/GhidraVibe-*.dmg dist/latest.json \
                --title "GhidraVibe Beta" \
                --notes-file "$NOTES" \
                --prerelease
            fi
          fi

      - name: Update releases branch index
        if: steps.swift-check.outputs.swift_62_available == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Lightweight branch: latest.json + RELEASE_NOTES only (DMG lives on Releases page).
          WORK="$(mktemp -d)"
          git fetch origin releases 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/releases; then
            git worktree add "$WORK" origin/releases
          else
            git worktree add --detach "$WORK"
            git -C "$WORK" checkout --orphan releases
            git -C "$WORK" rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p "$WORK/dist"
          cp -f dist/latest.json "$WORK/dist/latest.json"
          cp -f dist/RELEASE_NOTES.md "$WORK/dist/RELEASE_NOTES.md"
          # Keep a short rolling changelog on the branch.
          {
            echo "# GhidraVibe releases index"
            echo
            echo "Artifacts are published on the [GitHub Releases](https://github.com/${GITHUB_REPOSITORY}/releases) page."
            echo "This branch only tracks the latest channel metadata."
            echo
            cat dist/latest.json
            echo
            echo "---"
            echo
            cat dist/RELEASE_NOTES.md
          } >"$WORK/README.md"
          git -C "$WORK" add dist/latest.json dist/RELEASE_NOTES.md README.md
          if git -C "$WORK" diff --cached --quiet; then
            echo "releases branch already up to date"
          else
            git -C "$WORK" -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -m "release: ${GITHUB_REF_NAME} (${GITHUB_SHA:0:7})"
            git -C "$WORK" push origin HEAD:releases
          fi
          git worktree remove --force "$WORK" || true

      - name: Upload workflow artifact
        if: steps.swift-check.outputs.swift_62_available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: GhidraVibe-dmg
          path: |
            dist/*.dmg
            dist/latest.json
            dist/RELEASE_NOTES.md
          if-no-files-found: error
          retention-days: 14
