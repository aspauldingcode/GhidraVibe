name: Multi-platform CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  # Test Linux GTK build
  linux-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Build Linux GTK frontend
        run: |
          nix build .#ghidraVibeGtk -L
      - name: Check GTK binary
        run: |
          if [ -f result/bin/ghidra-vibe ]; then
            echo "GTK binary built successfully"
            file result/bin/ghidra-vibe
          else
            echo "ERROR: GTK binary not found"
            exit 1
          fi
  
  # Test macOS SwiftUI build
  macos-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Build macOS SwiftUI frontend
        run: |
          nix build .#ghidraVibeApp -L
      - name: Check macOS app bundle
        run: |
          if [ -d result/Applications/GhidraVibe.app ]; then
            echo "macOS app bundle built successfully"
            ls -la result/Applications/GhidraVibe.app/Contents/MacOS/
          else
            echo "ERROR: macOS app bundle not found"
            exit 1
          fi
  
  # Test Rust tools compilation
  rust-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Build Rust tools
        run: |
          nix build .#ghidraVibeTools -L
      - name: Check DSC indexer
        run: |
          if [ -f result/bin/ghidra-vibe-dsc-index ]; then
            echo "DSC indexer built successfully"
            result/bin/ghidra-vibe-dsc-index --help || true
          else
            echo "ERROR: DSC indexer not found"
            exit 1
          fi
  
  # Test Ghidra engine build
  engine-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Build Ghidra engine
        run: |
          nix build .#ghidraVibe -L --max-jobs 4
      - name: Verify engine artifacts
        run: |
          ls -la result/lib/ghidra/
          ls -la result/share/ghidra-vibe/
  
  # Flake check (validates all flake outputs)
  flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: nix flake check
        run: nix flake check -L --keep-going
  
  # Test dyld scripts (Linux)
  dyld-scripts-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test dyld script help
        run: |
          ./scripts/ghidra-vibe-dyld --help
          ./scripts/ghidra-vibe-dyld setup-ipsw --help || echo "setup-ipsw documented"
      - name: Test Python dsc_index
        run: |
          python3 scripts/lib/dsc_index.py --help || true
  
  # Smoke test: validate parity files
  parity-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate parity JSON files
        run: |
          for f in native-ui/parity/*.json; do
            if [ -f "$f" ]; then
              echo "Validating $f"
              python3 -m json.tool "$f" > /dev/null
            fi
          done
      - name: Check capability matrix
        run: |
          if [ -f native-ui/parity/CAPABILITY_MATRIX.json ]; then
            echo "Capability matrix found"
            python3 -c "import json; data=json.load(open('native-ui/parity/CAPABILITY_MATRIX.json')); print(f'Capabilities: {len(data.get(\"probes\", []))}')"
          fi
  
  # Test dyld workflow (basic)
  dyld-workflow-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run dyld workflow test (no MCP)
        run: |
          ./gui-tests/test-dyld-workflow.sh || echo "Test requires cache setup"
      - name: Validate test script exists
        run: |
          if [ -f gui-tests/test-dyld-workflow.sh ]; then
            echo "✓ Dyld workflow test script exists"
          fi
          if [ -f gui-tests/test-dyld-decompile-mcp.sh ]; then
            echo "✓ Dyld MCP decompilation test script exists"
          fi
  
  # Device Agent CLI Tests
  device-agent-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test device agent CLI help
        run: |
          ./scripts/ghidra-vibe-device-agent --help
          echo "✓ Device agent CLI executable"
      - name: Test test recorder CLI help
        run: |
          ./scripts/ghidra-vibe-test-recorder --help
          echo "✓ Test recorder CLI executable"
      - name: Validate test scenarios
        run: |
          for scenario in gui-tests/scenarios/*.json; do
            if [ -f "$scenario" ]; then
              echo "Validating $scenario"
              python3 -m json.tool "$scenario" > /dev/null
            fi
          done
      - name: List test scenarios
        run: |
          echo "Available test scenarios:"
          ls -1 gui-tests/scenarios/*.json | xargs -n1 basename
