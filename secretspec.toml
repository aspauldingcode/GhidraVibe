# Secret *names* only — never commit values.
# Proprietary LLM access is opt-in via Nix `agent.apiKeyFile` or Agent Setup (key *file* path).
# Provision keys with your private vault (pass / SecretSpec / agenix) outside this package.
# GhidraVibe never bundles LLM weights; local models are Ollama tags or GGUF drops.

[project]
name = "ghidra-vibe"

[profiles.default]
openai_api_key = { description = "Optional OpenAI / OpenAI-compatible API key (user file; never bundled)" }
anthropic_api_key = { description = "Optional Anthropic API key (user file; never bundled)" }
google_api_key = { description = "Optional Google Gemini API key (user file; never bundled)" }
